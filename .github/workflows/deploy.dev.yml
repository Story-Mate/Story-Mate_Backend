name: CI/CD using github actions & docker (dev)

on:
  push:
    branches: [ "feature/#4" ]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-22.04
    environment: development
    steps:
      # 소스 코드 체크아웃
      - name: Checkout repository
        uses: actions/checkout@v3

      # Docker Buildx 설정 (멀티 플랫폼 빌드나 캐시 사용을 위해)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # AWS 자격증명을 설정
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # AWS ECR 로그인
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v1

      # Docker 이미지 빌드 및 태깅
      - name: Build Docker Image
        run: |
          IMAGE_TAG=${{ github.sha }}
          docker build -f deploy/dev.dockerfile -t storymate/be:$IMAGE_TAG .
          docker tag storymate/be:$IMAGE_TAG ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/storymate/be:$IMAGE_TAG

      # Docker 이미지를 AWS ECR에 푸시
      - name: Push Docker Image to ECR
        run: |
          IMAGE_TAG=${{ github.sha }}
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/storymate/be:$IMAGE_TAG

      # docker-compose 파일 내 이미지 태그 업데이트  
      #    docker-compose.yml 파일에 미리 placeholder (예: my-app:latest)로 설정되어 있다면 sed 명령어로 최신 태그로 변경합니다.
      - name: Update docker-compose image tag
        run: |
          IMAGE_TAG=${{ github.sha }}
          sed -i "s|image: storymate/be:${TAG}|image: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/storymate/be:$IMAGE_TAG|g" deploy/docker-compose.dev.yml

      # .env 파일 생성
      - name: Write .env file from secret
        run: |
          echo "${{ secrets.ENV_FILE }}" > ./deploy/.env
          [ -f "deploy/.env" ] && echo ".env 생성 완료" || echo ".env 생성 실패"
          
      # EC2로 docker-compose, .env 파일 복사 (scp 액션 사용)
      - name: Copy docker-compose file to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          source: "deploy/docker-compose.dev.yml,deploy/.env"
          target: "/home/${{ secrets.EC2_USER }}/"

      # EC2에 접속해 docker-compose를 통한 배포 실행
      - name: Deploy application on EC2
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            cd /home/${{ secrets.EC2_USER }}/deploy
            # .env 파일 내 CR 문자 제거
            sed -i 's/\r//' .env
            # 기존 컨테이너 종료 (실행중이 없으면 에러 무시)
            docker compose -f docker-compose.dev.yml down || true
            # 최신 이미지 pull (docker-compose.yml 내에 태그가 업데이트 되어 있어야 함)
            docker compose -f docker-compose.dev.yml pull
            # 컨테이너 백그라운드 실행
            docker compose -f docker-compose.dev.yml up -d
